<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRYSTDLE — Daily Mineral Guessing Game</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #08080b;
            --accent-gold: #c8a84b;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            
            --green-bg: rgba(45, 110, 74, 0.35);
            --green-text: #4aab74;
            --red-bg: rgba(110, 45, 45, 0.35);
            --red-text: #c46060;
            --arrow-bg: rgba(200, 168, 75, 0.15);
            --arrow-text: #c8a84b;
            
            --cell-border: rgba(200, 168, 75, 0.08);
            --font-display: 'Cinzel', serif;
            --font-body: 'Crimson Pro', serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Ambient Glow Blobs */
        .glow-blob {
            position: fixed;
            width: 40vw;
            height: 40vw;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
        }
        .glow-gold {
            top: -10%;
            right: -10%;
            background: var(--accent-gold);
        }
        .glow-green {
            bottom: -10%;
            left: -10%;
            background: var(--green-text);
        }

        /* Grain Texture */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .wrap {
            width: 100%;
            max-width: 1200px;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 1rem;
        }

        .logo {
            font-family: var(--font-display);
            font-weight: 900;
            font-size: 3.5rem;
            letter-spacing: 0.3rem;
            color: var(--accent-gold);
            text-shadow: 0 0 20px rgba(200, 168, 75, 0.3);
            animation: glow 4s ease-in-out infinite alternate;
            user-select: none;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(200, 168, 75, 0.2); }
            to { text-shadow: 0 0 30px rgba(200, 168, 75, 0.5); }
        }

        .tagline {
            font-family: var(--font-body);
            font-weight: 300;
            font-style: italic;
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        /* Input Area (Moved Up) */
        #inputArea {
            width: 100%;
            max-width: 500px;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 1.5rem 0;
            align-items: center;
            z-index: 100;
        }

        .input-row {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .input-wrap {
            flex-grow: 1;
            position: relative;
            width: 100%;
        }

        #guessCounter {
            font-family: var(--font-display);
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1rem;
        }

        #alreadyGuessedHint {
            font-family: var(--font-body);
            font-size: 0.85rem;
            color: var(--accent-gold);
            height: 1.2rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(200, 168, 75, 0.3);
            border-radius: 4px;
            padding: 12px 16px;
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent-gold);
        }

        button#guessBtn {
            background: var(--accent-gold);
            color: var(--bg-color);
            border: none;
            border-radius: 4px;
            padding: 0 24px;
            font-family: var(--font-display);
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button#guessBtn:hover {
            opacity: 0.9;
        }

        button#guessBtn:active { transform: scale(0.95); }

        /* Legend */
        .legend {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            font-family: var(--font-display);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 2px;
        }
        .dot.green { background-color: var(--green-text); }
        .dot.red { background-color: var(--red-text); }
        .dot.gold { background-color: var(--accent-gold); }

        /* Table */
        .table-container {
            width: 100%;
            overflow-x: auto;
            margin-bottom: 2rem;
        }

        .col-headers {
            position: sticky;
            top: 0;
            background: var(--bg-color);
            z-index: 10;
            width: 100%;
            display: grid;
            grid-template-columns: 190px repeat(7, 1fr);
            gap: 4px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 8px;
            min-width: 1000px;
        }

        .header-cell {
            font-family: var(--font-display);
            font-size: 0.75rem;
            font-weight: 600;
            text-align: center;
            color: var(--text-muted);
            padding: 8px 4px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #guessTable {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 1000px;
        }

        .empty-prompt {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            padding: 2rem;
            width: 100%;
            opacity: 0.5;
        }

        .guess-row {
            display: grid;
            grid-template-columns: 190px repeat(7, 1fr);
            gap: 4px;
            width: 100%;
            animation: rowIn 0.5s ease-out forwards;
        }

        @keyframes rowIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .cell {
            min-height: 64px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--cell-border);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px;
            text-align: center;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            position: relative;
            transform: rotateX(-90deg);
            animation: flipIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes flipIn {
            to { transform: rotateX(0); }
        }

        .cell.name-cell {
            font-family: var(--font-display);
            font-weight: 600;
            color: var(--accent-gold);
            text-transform: uppercase;
        }

        .cell-formula {
            display: block;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 2px;
            font-family: var(--font-mono);
            text-transform: none;
        }

        .cell.green { background: var(--green-bg); color: var(--green-text); border-color: rgba(74, 171, 116, 0.2); }
        .cell.red { background: var(--red-bg); color: var(--red-text); border-color: rgba(196, 96, 96, 0.2); }
        .cell.arrow { background: var(--arrow-bg); color: var(--arrow-text); border-color: rgba(200, 168, 75, 0.2); }

        .cell-value { display: block; }
        .cell-icon { font-size: 1.2rem; margin-top: 4px; }

        /* Autocomplete */
        #autocomplete {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 0;
            width: 100%;
            background: #0c0c10;
            border: 1px solid var(--accent-gold);
            border-radius: 4px;
            max-height: 220px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .auto-item {
            padding: 12px 16px;
            cursor: pointer;
            font-family: var(--font-display);
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            text-align: left;
        }

        .auto-item:hover, .auto-item.selected {
            background: rgba(200, 168, 75, 0.1);
            color: var(--accent-gold);
        }

        .auto-item mark {
            background: transparent;
            color: var(--accent-gold);
            font-weight: 900;
            text-decoration: underline;
        }

        /* Modal */
        #modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .modal-content {
            background: #121218;
            border: 1px solid rgba(200, 168, 75, 0.3);
            border-top: 2px solid var(--accent-gold);
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            padding: 3rem 2rem;
            text-align: center;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        #modalImage {
            width: 100%;
            max-width: 300px;
            height: 200px;
            object-fit: cover;
            border-radius: 4px;
            margin: 0 auto 1.5rem;
            border: 1px solid rgba(200, 168, 75, 0.2);
            background: rgba(255,255,255,0.02);
            display: block;
        }

        #modalResultLabel {
            font-family: var(--font-display);
            font-size: 0.9rem;
            letter-spacing: 0.2rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            display: block;
        }

        #modalMineralName {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--accent-gold);
            margin-bottom: 0.5rem;
        }

        #modalFormula {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .modal-divider {
            width: 50px;
            height: 2px;
            background: var(--accent-gold);
            margin: 0 auto 1.5rem;
        }

        #modalFunFact {
            font-family: var(--font-body);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        #modalScoreLine {
            font-family: var(--font-display);
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        button#playAgainBtn {
            background: transparent;
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            border-radius: 4px;
            padding: 12px 32px;
            font-family: var(--font-display);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button#playAgainBtn:hover {
            background: var(--accent-gold);
            color: var(--bg-color);
        }

        /* Particles */
        .particle {
            position: fixed;
            width: 6px;
            height: 6px;
            pointer-events: none;
            z-index: 2000;
            border-radius: 50%;
        }

        @keyframes particleFall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.2s ease-in-out 0s 2; }

    </style>
</head>
<body>

    <div class="wrap">

            <div id="guessTable">

    </div>

    <div id="modal" role="dialog" aria-modal="true">
        <div class="modal-content">

            <span id="modalResultLabel"></span>

            <button id="playAgainBtn">PLAY AGAIN</button>

    </div>

        let state = {
            answer: null,
            guesses: [],
            gameOver: false,
            won: false
        };

        const BIRE_ORDER = ["None", "Weak", "Moderate", "Strong", "Extreme"];

        const elements = {
            guessTable: document.getElementById('guessTable'),
            guessInput: document.getElementById('guessInput'),
            guessBtn: document.getElementById('guessBtn'),
            autocomplete: document.getElementById('autocomplete'),
            modal: document.getElementById('modal'),
            modalImage: document.getElementById('modalImage'),
            modalResultLabel: document.getElementById('modalResultLabel'),
            modalMineralName: document.getElementById('modalMineralName'),
            modalFormula: document.getElementById('modalFormula'),
            modalFunFact: document.getElementById('modalFunFact'),
            modalScoreLine: document.getElementById('modalScoreLine'),
            modalMindatLink: document.getElementById('modalMindatLink'),
            playAgainBtn: document.getElementById('playAgainBtn'),
            guessCounter: document.getElementById('guessCounter'),
            alreadyGuessedHint: document.getElementById('alreadyGuessedHint'),
            inputArea: document.getElementById('inputArea')
        };

        function initGame(isDaily = true) {
            if (isDaily) {
                const now = new Date();
                const seed = now.getFullYear() * 10000 + (now.getMonth() + 1) * 100 + now.getDate();
                state.answer = MINERALS[seed % MINERALS.length];
            } else {
                state.answer = MINERALS[Math.floor(Math.random() * MINERALS.length)];
            }
            
            state.guesses = [];
            state.gameOver = false;
            state.won = false;
            
            elements.guessTable.innerHTML = '<div class="empty-prompt">Type a mineral name to begin...</div>';
            elements.guessInput.value = '';
            elements.modal.style.display = 'none';
            elements.modal.style.opacity = '0';
            elements.modalImage.style.display = 'none';
            updateGuessCounter();
        }

        function updateGuessCounter() {
            elements.guessCounter.textContent = `Guess ${state.guesses.length + 1} — No limit`;
        }

        // Autocomplete Logic
        let selectedIndex = -1;

        elements.guessInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            
            if (state.guesses.some(g => g.toLowerCase() === query)) {
                elements.alreadyGuessedHint.style.opacity = '1';
            } else {
                elements.alreadyGuessedHint.style.opacity = '0';
            }

            if (!query) {
                closeAutocomplete();
                return;
            }

            const matches = MINERALS.filter(m => 
                m.name.toLowerCase().includes(query) && 
                !state.guesses.includes(m.name)
            ).slice(0, 8);

            renderAutocomplete(matches, query);
        });

        elements.guessInput.addEventListener('keydown', (e) => {
            if (state.gameOver) return;

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                moveSelection(1);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                moveSelection(-1);
            } else if (e.key === 'Enter') {
                e.preventDefault();
                const items = elements.autocomplete.children;
                if (selectedIndex >= 0 && items[selectedIndex]) {
                    submitGuess(items[selectedIndex].dataset.name);
                } else {
                    submitGuess(elements.guessInput.value);
                }
            } else if (e.key === 'Escape') {
                closeAutocomplete();
            }
        });

        function renderAutocomplete(matches, query) {
            if (matches.length === 0) {
                closeAutocomplete();
                return;
            }

            elements.autocomplete.innerHTML = '';
            matches.forEach((m, i) => {
                const item = document.createElement('div');
                item.className = 'auto-item';
                item.setAttribute('role', 'option');
                item.dataset.name = m.name;
                
                const regex = new RegExp(`(${query})`, 'gi');
                item.innerHTML = m.name.replace(regex, '<mark>$1</mark>');
                
                item.addEventListener('click', () => submitGuess(m.name));
                elements.autocomplete.appendChild(item);
            });

            elements.autocomplete.style.display = 'block';
            selectedIndex = -1;
        }

        function moveSelection(dir) {
            const items = elements.autocomplete.children;
            if (items.length === 0) return;

            if (selectedIndex >= 0) items[selectedIndex].classList.remove('selected');
            selectedIndex = (selectedIndex + dir + items.length) % items.length;
            items[selectedIndex].classList.add('selected');
            items[selectedIndex].scrollIntoView({ block: 'nearest' });
        }

        function closeAutocomplete() {
            elements.autocomplete.innerHTML = '';
            elements.autocomplete.style.display = 'none';
            selectedIndex = -1;
        }

        // Guess Logic
        function submitGuess(name) {
            if (state.gameOver || !name) return;
            
            const mineral = MINERALS.find(m => m.name.toLowerCase() === name.trim().toLowerCase());

            if (!mineral) {
                shakeInput();
                return;
            }

            if (state.guesses.includes(mineral.name)) {
                elements.alreadyGuessedHint.style.opacity = '1';
                setTimeout(() => elements.alreadyGuessedHint.style.opacity = '0', 2000);
                shakeInput();
                return;
            }

            if (state.guesses.length === 0) {
                elements.guessTable.innerHTML = '';
            }

            closeAutocomplete();
            evaluateGuess(mineral);
            elements.guessInput.value = '';
            elements.alreadyGuessedHint.style.opacity = '0';
            elements.guessInput.focus();
            updateGuessCounter();
        }

        function shakeInput() {
            elements.guessInput.parentElement.classList.add('shake');
            setTimeout(() => elements.guessInput.parentElement.classList.remove('shake'), 400);
        }

        function evaluateGuess(guess) {
            state.guesses.push(guess.name);
            const ans = state.answer;
            
            const results = [
                { val: guess.name, formula: guess.formula, status: 'name' },
                compareNumeric(guess.hardness, ans.hardness),
                compareNumeric(guess.specificGravity, ans.specificGravity, 0.3),
                compareCategorical(guess.luster, ans.luster),
                compareCategorical(guess.crystalSystem, ans.crystalSystem),
                compareCategorical(guess.chemicalGroup, ans.chemicalGroup),
                compareBirefringence(guess.birefringence, ans.birefringence),
                compareCategorical(guess.opticalClass, ans.opticalClass)
            ];

            renderRow(results);

            const isWin = results.slice(1).every(r => r.status === 'green');
            if (isWin) {
                endGame(true);
            }
        }

        function compareNumeric(val, target, tolerance = 0) {
            if (Math.abs(val - target) <= tolerance) return { val, status: 'green', icon: '✓' };
            return { 
                val, 
                status: 'arrow', 
                icon: val < target ? '↑' : '↓' 
            };
        }

        function compareBirefringence(val, target) {
            const idxVal = BIRE_ORDER.indexOf(val);
            const idxTarget = BIRE_ORDER.indexOf(target);
            
            if (idxVal === idxTarget) return { val, status: 'green', icon: '✓' };
            return { 
                val, 
                status: 'arrow', 
                icon: idxVal < idxTarget ? '↑' : '↓' 
            };
        }

        function compareCategorical(val, target) {
            const displayVal = typeof val === 'boolean' ? (val ? 'Yes' : 'No') : val;
            if (val === target) return { val: displayVal, status: 'green', icon: '✓' };
            return { val: displayVal, status: 'red', icon: '✗' };
        }

        function renderRow(results) {
            const row = document.createElement('div');
            row.className = 'guess-row';
            
            results.forEach((res, i) => {
                const cell = document.createElement('div');
                cell.className = `cell ${res.status}`;
                cell.style.animationDelay = `${i * 0.08}s`;
                
                const valSpan = document.createElement('span');
                valSpan.className = 'cell-value';
                valSpan.textContent = res.val;
                cell.appendChild(valSpan);

                if (res.formula) {
                    const formSpan = document.createElement('span');
                    formSpan.className = 'cell-formula';
                    formSpan.textContent = res.formula;
                    cell.appendChild(formSpan);
                }
                
                if (res.icon) {
                    const iconSpan = document.createElement('span');
                    iconSpan.className = 'cell-icon';
                    iconSpan.textContent = res.icon;
                    cell.appendChild(iconSpan);
                }
                
                row.appendChild(cell);
            });

            elements.guessTable.prepend(row);
        }

        async function endGame(won) {
            state.gameOver = true;
            state.won = won;

            if (won) spawnParticles();

            // Fetch Image
            try {
                const wikiRes = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${state.answer.wikiTitle}`);
                const wikiData = await wikiRes.json();
                if (wikiData.thumbnail && wikiData.thumbnail.source) {
                    elements.modalImage.src = wikiData.thumbnail.source;
                    elements.modalImage.alt = state.answer.name;
                    elements.modalImage.style.display = 'block';
                } else {
                    elements.modalImage.style.display = 'none';
                }
            } catch (err) {
                console.error("Wiki fetch failed", err);
                elements.modalImage.style.display = 'none';
            }

            setTimeout(() => {
                elements.modalResultLabel.textContent = won ? 'IDENTIFIED' : 'THE ANSWER WAS';
                elements.modalMineralName.textContent = state.answer.name;
                elements.modalFormula.textContent = state.answer.formula;
                elements.modalFunFact.textContent = state.answer.funFact;
                elements.modalMindatLink.href = state.answer.mindatUrl;
                elements.modalScoreLine.textContent = won 
                    ? `Solved in ${state.guesses.length} guesses` 
                    : '';
                
                elements.modal.style.display = 'flex';
                setTimeout(() => elements.modal.style.opacity = '1', 10);
            }, 500);
        }

        function spawnParticles() {
            for (let i = 0; i < 50; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = '-20px';
                p.style.backgroundColor = Math.random() > 0.5 ? 'var(--accent-gold)' : 'var(--green-text)';
                p.style.animation = `particleFall ${2 + Math.random() * 2}s linear forwards`;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 4000);
            }
        }

        elements.guessBtn.addEventListener('click', () => submitGuess(elements.guessInput.value));
        elements.playAgainBtn.addEventListener('click', () => initGame(false));
        
        document.addEventListener('click', (e) => {
            if (!elements.inputArea.contains(e.target)) closeAutocomplete();
        });

        initGame();
    </script>
